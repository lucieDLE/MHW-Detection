name: mhw-detection
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python =3.11
  - numpy >=2.2,<3
  - pandas >=2.2,<3
  - xarray >=2025.7,<2026
  - netcdf4 >=1.7,<2
  - h5netcdf >=1.6,<2
  - scipy >=1.16,<2
  - scikit-learn >=1.6,<2
  - matplotlib-base >=3.10,<4
  - seaborn >=0.13,<0.14
  - bokeh >=3.8,<4
  - holoviews >=1.20,<2
  - hvplot >=0.11,<0.12
  - panel >=1.5,<2
  - jupyterlab >=4.4,<5
  - jupyter_bokeh >=4.0,<5
